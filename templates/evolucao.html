{% extends "base.html" %}

{% block content %}

<h1>Evolução de Preços por Posto</h1>

<div class="card p-3 mb-4">
<canvas id="grafico"></canvas>
</div>

<table class="table table-dark table-striped">
<tr>
<th>Posto</th>
<th>Combustível</th>
<th>Preço</th>
<th>Data</th>
</tr>

{% for linha in dados %}
<tr>
<td>{{ linha[0] }}</td>
<td>{{ linha[1] }}</td>
<td>R$ {{ "%.2f"|format(linha[2])|replace('.', ',') }}</td>
<td>{{ linha[3] }}</td>
</tr>
{% endfor %}

</table>

<script>

var dadosGrafico = JSON.parse('{{ dados | tojson | safe }}');

var datasets = {};
var labels = [];

dadosGrafico.forEach(function(item){

var posto = item[0];
var combustivel = item[1];
var valor = item[2];
var data = item[3];

var chave = posto + " - " + combustivel;

if(!datasets[chave]){
datasets[chave] = {
label: chave,
data: [],
borderWidth: 2,
fill: false
};
}

datasets[chave].data.push(valor);

if(!labels.includes(data)){
labels.push(data);
}

});

new Chart(document.getElementById("grafico"), {
type: "line",
data: {
labels: labels,
datasets: Object.values(datasets)
},
options: {
responsive: true,
plugins: {
legend: {
position: 'top'
}
}
}
});

</script>

{% endblock %}
